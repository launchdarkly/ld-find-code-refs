version: "2"
run:
  tests: false
linters:
  default: all
  disable:
    - cyclop
    - depguard
    - err113
    - errcheck
    - errname
    - exhaustive
    - exhaustruct
    - funcorder
    - gochecknoglobals
    - gocognit
    - gocritic
    - godoclint
    - godot
    - gosec
    - lll
    - mnd
    - nestif
    - nilerr
    - nilnil
    - nlreturn
    - noinlineerr
    - nonamedreturns
    - revive
    - tagalign
    - tagliatelle
    - varnamelen
    - wsl
    - wsl_v5
  settings:
    staticcheck:
      checks:
        - all
        - -ST1*
        - -QF1*
  exclusions:
    generated: lax
    rules:
      - linters:
          - staticcheck
        text: SA5011
      - path: (.+)\.go$
        text: error returned from external package is unwrapped
      - path: (.+)\.go$
        text: error returned from interface method should be wrapped
      - path: (.+)\.go$
        text: comparing with == will fail on wrapped errors. Use errors.Is to check for a specific error
      - path: (.+)\.go$
        text: comparing with != will fail on wrapped errors. Use errors.Is to check for a specific error
      - path: (.+)\.go$
        text: non-wrapping format verb for fmt.Errorf. Use `%w` to format errors
      - path: (.+)\.go$
        text: append to slice `projectKeys` with non-zero initialized length
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-same-issues: 1000
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
